    <circle cx="-20" cy="100" r="44"/>
    <line x1="0" y1="0" x2="80" y2="40"/>
    <line x1="0" y1="0" x2="-20" y2="100"/>
    <line x1="80" y1="40" x2="-20" y2="100"/>
  </g>
