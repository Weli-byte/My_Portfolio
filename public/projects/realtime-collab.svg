    <text x="64" y="588" font-size="22" fill="rgba(255,255,255,0.72)">Multiplayer document editor with offline support</text>
  </g>
  <g transform="translate(880,160)" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3">
    <circle cx="0" cy="0" r="44"/>
